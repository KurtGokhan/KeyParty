name: Release

on:
  push:
    branches: [main]

  workflow_dispatch:

# Changesets needs to push the version commit/tag and open the version PR;
# the binary job needs to upload an asset to the release.
permissions:
  contents: write
  pull-requests: write

# Don't run two releases at once, but let an in-progress one finish.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # 1. Changesets: open/update the "Version Packages" PR, or — once that PR is
  #    merged — tag the new version and create the GitHub Release.
  release:
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install release tooling
        # Only Changesets is needed here; skip zero-native's postinstall (the
        # native CLI download) — the binary jobs do a full install for that.
        run: npm install --ignore-scripts

      - name: Create version PR or tag a release
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run version
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 2. Build the macOS app and attach it to the release Changesets just created.
  binary-macos:
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install dependencies (zero-native framework + CLI)
        run: |
          npm install
          echo "$GITHUB_WORKSPACE/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Resolve the released version
        id: ver
        run: |
          VER=$(echo '${{ needs.release.outputs.publishedPackages }}' | jq -r '.[0].version')
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "tag=keyparty@$VER" >> "$GITHUB_OUTPUT"

      - name: Build & package the macOS app
        run: |
          zig build package \
            -Doptimize=ReleaseFast \
            -Dpackage-target=macos

      - name: Zip the .app bundle
        run: |
          APP="$(ls -d zig-out/package/*.app | head -n1)"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "keyparty-${{ steps.ver.outputs.version }}-macos.zip"

      - name: Attach the binary to the release
        run: gh release upload "${{ steps.ver.outputs.tag }}" "keyparty-${{ steps.ver.outputs.version }}-macos.zip" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 3. Build the Windows app (full-screen kiosk WebView2 host) and attach it.
  binary-windows:
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: windows-latest
    env:
      # Where the WebView2 SDK headers land (NuGet, version stripped).
      NUGET_DIR: packages/Microsoft.Web.WebView2
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      # Sets the MSVC environment (INCLUDE, WindowsSdkDir, WindowsSdkVersion, …)
      # so Zig's msvc target finds the toolchain and we can locate the winrt
      # headers (wrl.h) the WebView2 host needs.
      - uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies (zero-native framework + CLI)
        shell: bash
        run: |
          npm install
          echo "$GITHUB_WORKSPACE/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Fetch the WebView2 SDK headers + loader
        shell: bash
        run: nuget install Microsoft.Web.WebView2 -OutputDirectory packages -ExcludeVersion

      - name: Resolve the released version
        id: ver
        shell: bash
        run: |
          VER=$(echo '${{ needs.release.outputs.publishedPackages }}' | jq -r '.[0].version')
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "tag=keyparty@$VER" >> "$GITHUB_OUTPUT"

      - name: Build & package the Windows app
        shell: bash
        run: |
          # Absolute include paths (relative -I can miss in Zig's compile sandbox).
          WV2_INC="$GITHUB_WORKSPACE/$NUGET_DIR/build/native/include"
          # wrl.h lives in the Windows SDK "winrt" folder, which Zig's msvc target
          # does not add automatically. msvc-dev-cmd exports the SDK version as
          # $WindowsSDKVersion (note the case — bash names are case-sensitive); if
          # that path doesn't pan out, fall back to the winrt entry on $INCLUDE.
          WINRT="${WindowsSdkDir}Include/${WindowsSDKVersion}winrt"
          if [ ! -f "$WINRT/wrl.h" ]; then
            WINRT=$(echo "$INCLUDE" | tr ';' '\n' | grep -iE '[\\/]winrt$' | head -n1)
          fi
          echo "WebView2 include: $WV2_INC"
          echo "winrt include:    $WINRT"
          # Fail loudly if the headers are missing — otherwise the host silently
          # compiles to a blank-window stub (ZERO_NATIVE_HAS_WEBVIEW2 = 0).
          test -f "$WV2_INC/WebView2.h" || { echo "ERROR: WebView2.h not found at $WV2_INC"; ls -R "$GITHUB_WORKSPACE/$NUGET_DIR" 2>/dev/null | head -40; exit 1; }
          test -f "$WINRT/wrl.h" || { echo "ERROR: wrl.h not found at $WINRT"; exit 1; }
          zig build package \
            -Dtarget=x86_64-windows-msvc \
            -Doptimize=ReleaseFast \
            -Dpackage-target=windows \
            -Dwebview2-include="$WV2_INC" \
            -Dwinrt-include="$WINRT"

      - name: Bundle the WebView2 loader and zip
        shell: bash
        run: |
          VER="${{ steps.ver.outputs.version }}"
          EXE=$(find zig-out/package -name '*.exe' | head -n1)
          if [ -z "$EXE" ]; then echo "no .exe produced"; ls -R zig-out/package; exit 1; fi
          # The Evergreen loader is loaded dynamically at runtime, so it must sit
          # next to the exe in the package.
          cp "$NUGET_DIR/build/native/x64/WebView2Loader.dll" "$(dirname "$EXE")/"
          cd zig-out/package
          DIRS=$(ls -d */ 2>/dev/null || true)
          if [ -n "$DIRS" ]; then
            7z a -tzip "../../keyparty-$VER-windows.zip" $DIRS >/dev/null
          else
            7z a -tzip "../../keyparty-$VER-windows.zip" ./* >/dev/null
          fi

      - name: Attach the binary to the release
        shell: bash
        run: gh release upload "${{ steps.ver.outputs.tag }}" "keyparty-${{ steps.ver.outputs.version }}-windows.zip" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
